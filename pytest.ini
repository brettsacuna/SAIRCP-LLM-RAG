[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short
markers =
    unit: Pruebas unitarias
    integration: Pruebas de integración
    slow: Pruebas con OpenAI real

[coverage:run]
source = src
omit = src/__init__.py, src/*/__init__.py

[coverage:report]
fail_under = 60
show_missing = true
