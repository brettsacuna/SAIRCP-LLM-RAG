[pytest]
testpaths = tests
asyncio_mode = auto
addopts = -v --tb=short
markers =
    unit: Pruebas unitarias
    integration: Pruebas de integración end-to-end
    slow: Pruebas que requieren llamadas a OpenAI

[tool:pytest]
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = src
omit =
    src/__init__.py
    src/*/__init__.py

[coverage:report]
fail_under = 60
show_missing = true
exclude_lines =
    pragma: no cover
    if __name__
    raise NotImplementedError
