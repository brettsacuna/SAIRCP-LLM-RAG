services:
  # ============================================
  # Frontend — Nginx (puerto 3001)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saircp-frontend
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Backend API — FastAPI (puerto 8000)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: saircp-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - chroma_data:/app/data/chroma
      - ./reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
  # ============================================
  # Base de datos — PostgreSQL 16
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: saircp-db
    environment:
      POSTGRES_USER: saircp
      POSTGRES_PASSWORD: saircp_pass
      POSTGRES_DB: saircp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saircp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  chroma_data:
