services:
  api:
    build: .
    container_name: saircp-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: saircp-db
    environment:
      POSTGRES_USER: saircp
      POSTGRES_PASSWORD: saircp_pass
      POSTGRES_DB: saircp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saircp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
