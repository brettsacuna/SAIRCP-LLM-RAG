name: CI — SAIRCP Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt && pip install pytest-cov httpx
      - name: Run tests with coverage
        run: |
          mkdir -p reports
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            --junitxml=reports/junit.xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit pip-audit
      - run: |
          mkdir -p reports
          bandit -r src/ -f json -o reports/bandit_report.json -ll || true
          pip install -r requirements.txt
          pip-audit --format=json --output=reports/pip_audit_report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/
